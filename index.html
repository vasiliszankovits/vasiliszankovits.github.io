    </script>
    <script>
        AFRAME.registerComponent('removing', {
            init: function () {
                var el = this.el;
                el.addEventListener('mouseenter', function () { el.setAttribute('color', 'red'); });
                el.addEventListener('mouseenter', function () { el.setAttribute('color', 'firebrick'); });
                el.addEventListener('click', function () { el.remove(); });
            }
        });
    </script>
  </head>

          <a-camera><a-cursor fuse="true" fuse-timeout="5000"></a-cursor>a-cursor></a-camera>
          <a-enity cursor raycaster="showLine: true" oculus-touch-controls="hand: right"></a-enity>
